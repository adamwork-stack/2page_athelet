<svg width="600" height="700" viewBox="0 0 600 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Radial gradients for glowing effect -->
    <radialGradient id="headGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B00;stop-opacity:0.9" />
    </radialGradient>
    
    <radialGradient id="torsoGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B00;stop-opacity:0.9" />
    </radialGradient>
    
    <linearGradient id="hipGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B00;stop-opacity:0.9" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Stronger glow for main shapes -->
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Head - Circular with radial gradient -->
  <circle cx="300" cy="120" r="35" fill="url(#headGradient)" filter="url(#strongGlow)"/>
  
  <!-- Torso - Oval with radial gradient -->
  <ellipse cx="300" cy="220" rx="50" ry="70" fill="url(#torsoGradient)" filter="url(#strongGlow)"/>
  
  <!-- Motion lines on left side -->
  <line x1="200" y1="200" x2="250" y2="200" stroke="#FF6B00" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  <line x1="195" y1="220" x2="250" y2="220" stroke="#FF6B00" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  <line x1="200" y1="240" x2="250" y2="240" stroke="#FF6B00" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  
  <!-- Motion lines on right side -->
  <line x1="350" y1="200" x2="400" y2="200" stroke="#FF6B00" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  <line x1="355" y1="220" x2="400" y2="220" stroke="#FF6B00" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  <line x1="350" y1="240" x2="400" y2="240" stroke="#FF6B00" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  
  <!-- Hips/Pelvis - Two overlapping triangles -->
  <path d="M 280 290 L 300 340 L 260 340 Z" fill="url(#hipGradient)" filter="url(#strongGlow)"/>
  <path d="M 320 290 L 340 340 L 300 340 Z" fill="url(#hipGradient)" filter="url(#strongGlow)"/>
  
  <!-- Legs - V-shaped lines -->
  <line x1="300" y1="340" x2="280" y2="450" stroke="#FF6B00" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <line x1="300" y1="340" x2="320" y2="450" stroke="#FF6B00" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  
  <!-- Additional glow layers for extra luminosity -->
  <circle cx="300" cy="120" r="35" fill="url(#headGradient)" opacity="0.3" filter="url(#glowFilter)"/>
  <ellipse cx="300" cy="220" rx="50" ry="70" fill="url(#torsoGradient)" opacity="0.3" filter="url(#glowFilter)"/>
</svg>
